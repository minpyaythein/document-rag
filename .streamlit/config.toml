[server]
# Cap uploads well under a free-tier host's ~512MB RAM. A 1MB text PDF is already a long
# document, and this is the hard stop against an oversized file OOM-killing the container.
maxUploadSize = 1

[client]
# Hide Streamlit's dev chrome (the top-right "Deploy" button and menu) on the public deploy.
toolbarMode = "minimal"
